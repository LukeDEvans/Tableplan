<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Live</h1>
      <p id="accountStatus">Checking connection...</p>
      <p id="status">Import recipes and save articles.</p>
      <button id="connectGoogle">Connect with Google</button>
      <div class="action-group" id="actionGroup" hidden>
        <button id="importCurrentPage">Import recipe</button>
        <button id="saveCurrentArticle" class="secondary-action">Save article</button>
        <button id="saveReceipt" class="secondary-action" hidden>Save receipt to Finance</button>
      </div>
      <div class="action-group" id="importSavedGroup" hidden>
        <button id="importSavedArticles" type="button">Import all saved articles</button>
      </div>
      <button class="secondary" id="signOut">Sign out</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
