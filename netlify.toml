[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[functions."scheduled-email"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/api/voice-command"
  to = "/.netlify/functions/voice-command"
  status = 200

[[redirects]]
  from = "/api/admin-data"
  to = "/.netlify/functions/admin-data"
  status = 200

[[redirects]]
  from = "/api/auto-tag-grocery"
  to = "/.netlify/functions/auto-tag-grocery"
  status = 200

[[redirects]]
  from = "/api/weekly-email"
  to = "/.netlify/functions/weekly-email"
  status = 200

[[redirects]]
  from = "/api/email-interview"
  to = "/.netlify/functions/email-interview"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/server.js"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/*.sql"
  to = "/index.html"
  status = 404
