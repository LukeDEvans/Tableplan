[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # VAPID_CONTACT_EMAIL is a contact address, not a credential — it is embedded
  # in every web-push request's claims and appears in reference SQL in the repo.
  SECRETS_SCAN_OMIT_KEYS = "VAPID_CONTACT_EMAIL,WEEKLY_REVIEW_TO"

[dev]
  command = "vite --port 5174"
  targetPort = 5174
  port = 5173
  autoLaunch = false
  context = "production"

[functions]
  directory = "netlify/functions"

[functions."scheduled-email"]
  schedule = "*/15 * * * *"

[functions."daily-briefing"]
  schedule = "0 13 * * *"

[functions."gmail-watch-rearm"]
  schedule = "0 11 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"

[[redirects]]
  from = "/api/push-subscribe"
  to = "/.netlify/functions/push-subscribe"
  status = 200

[[redirects]]
  from = "/api/check-hcl"
  to = "/.netlify/functions/check-hcl"
  status = 200

[[redirects]]
  from = "/api/voice-command"
  to = "/.netlify/functions/voice-command"
  status = 200

[[redirects]]
  from = "/api/admin-data"
  to = "/.netlify/functions/admin-data"
  status = 200

[[redirects]]
  from = "/api/auto-tag-grocery"
  to = "/.netlify/functions/auto-tag-grocery"
  status = 200

[[redirects]]
  from = "/api/weekly-email"
  to = "/.netlify/functions/weekly-email"
  status = 200

[[redirects]]
  from = "/api/email-interview"
  to = "/.netlify/functions/email-interview"
  status = 200

[[redirects]]
  from = "/data/*"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/server.js"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/*.sql"
  to = "/index.html"
  status = 404
