<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eat</title>
    <link rel="stylesheet" href="./styles.css?v=auth-deploy-1" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="header-main">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 32 32" role="img">
                <path d="M7 9c0-2.2 1.8-4 4-4h10c2.2 0 4 1.8 4 4v14c0 2.2-1.8 4-4 4H11c-2.2 0-4-1.8-4-4V9Z" />
                <path d="M11 10h10M11 16h10M11 22h6" />
              </svg>
            </div>
            <h1>Eat</h1>
          </div>
          <div class="account-tools">
            <span id="authStatus">Local storage</span>
            <button class="secondary-btn" id="authButton" type="button">Sign in</button>
          </div>
        </div>
        <div class="week-tools">
          <button class="icon-btn" id="previousWeek" title="Previous week" aria-label="Previous week">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6" /></svg>
          </button>
          <div class="prep-window-copy">
            <p class="prep-date-range" id="weekLabel" aria-live="polite">May 8 - May 15, 2026</p>
          </div>
          <button class="icon-btn" id="nextWeek" title="Next week" aria-label="Next week">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6" /></svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel recipe-panel collapsible-section" data-section="recipes" aria-label="Recipe library">
          <div class="panel-head">
            <div class="section-heading">
              <button class="icon-btn collapse-btn section-toggle" data-collapse="recipes" title="Collapse recipes" aria-label="Collapse recipes" aria-expanded="true">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
              </button>
              <div>
                <h2>Recipe Box</h2>
              </div>
            </div>
            <div class="library-actions">
              <button class="secondary-btn" id="importRecipeBtn">Import</button>
              <button class="primary-btn" id="newRecipeBtn">
                <span aria-hidden="true">+</span>
                New
              </button>
            </div>
          </div>
          <div class="collapsible-body" id="section-recipes">
            <label class="search">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" /></svg>
              <input id="recipeSearch" type="search" placeholder="Search recipes, folders, ingredients" />
            </label>
            <div class="folder-list" id="folderList" aria-label="Recipe folders"></div>
            <form class="folder-form" id="folderForm">
              <input id="folderInput" placeholder="Add recipe folder" />
              <button class="secondary-btn folder-add-btn" id="addFolderBtn" type="button">Add</button>
            </form>
            <div class="recipe-list" id="recipeList" hidden></div>
          </div>
        </aside>

        <section class="planner-column collapsible-section" data-section="mealPrep" aria-label="Weekly meal prep planner">
          <div class="planner-toolbar">
            <div class="section-heading">
              <button class="icon-btn collapse-btn section-toggle" data-collapse="mealPrep" title="Collapse meal prep" aria-label="Collapse meal prep" aria-expanded="true">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
              </button>
              <div>
                <h2>Meal Plan</h2>
              </div>
            </div>
          </div>
          <div class="collapsible-body" id="section-mealPrep">
            <div class="planner-grid" id="plannerGrid"></div>
          </div>
        </section>

        <aside class="side-stack" aria-label="Shopping and pantry tools">
          <section class="panel collapsible-section" data-section="groceries">
            <div class="panel-head">
              <div class="section-heading">
                <button class="icon-btn collapse-btn section-toggle" data-collapse="groceries" title="Collapse prep groceries" aria-label="Collapse prep groceries" aria-expanded="true">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
                </button>
                <div>
                  <h2>Groceries</h2>
                </div>
              </div>
              <button class="icon-btn" id="copyGroceriesBtn" title="Copy grocery list" aria-label="Copy grocery list">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h10v12H8z" /><path d="M6 16H4V4h12v2" /></svg>
              </button>
            </div>
            <div class="collapsible-body" id="section-groceries">
              <div class="grocery-list" id="groceryList"></div>
            </div>
          </section>

          <section class="panel collapsible-section" data-section="pantry">
            <div class="panel-head">
              <div class="section-heading">
                <button class="icon-btn collapse-btn section-toggle" data-collapse="pantry" title="Collapse pantry" aria-label="Collapse pantry" aria-expanded="true">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
                </button>
                <div>
                  <h2>Pantry</h2>
                </div>
              </div>
            </div>
            <div class="collapsible-body" id="section-pantry">
              <form class="inline-form" id="pantryForm">
                <input id="pantryInput" placeholder="Add pantry item" />
                <button class="icon-btn" title="Add pantry item" aria-label="Add pantry item">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
                </button>
              </form>
              <div class="chips" id="pantryList"></div>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <dialog class="recipe-dialog" id="recipeDialog">
      <form method="dialog" class="recipe-form" id="recipeForm">
        <div class="dialog-head">
          <div>
            <p class="muted-label">Recipe details</p>
            <h2 id="dialogTitle">Add recipe</h2>
          </div>
          <button class="icon-btn" type="button" id="closeRecipeBtn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>

        <input type="hidden" id="recipeId" />
        <label>
          Recipe name
          <input id="recipeName" required placeholder="Lemon chicken bowls" />
        </label>
        <div class="form-grid">
          <label>
            Prep time
            <input id="recipeTime" placeholder="35 min" />
          </label>
          <label>
            Servings
            <input id="recipeServings" inputmode="numeric" pattern="[0-9]*" placeholder="4" />
          </label>
        </div>
        <label>
          Folder
          <select id="recipeFolder"></select>
        </label>
        <label>
          Source URL
          <input id="recipeSourceUrl" placeholder="https://cooking.nytimes.com/..." />
        </label>
        <section class="ingredient-editor" aria-label="Ingredients">
          <div class="ingredient-editor-head">
            <label>Ingredients</label>
            <button class="secondary-btn" type="button" id="addIngredientBtn">Add item</button>
          </div>
          <div class="ingredient-grid ingredient-grid-head" aria-hidden="true">
            <span>Number</span>
            <span>Qty</span>
            <span>Item</span>
            <span>Prep</span>
            <span></span>
          </div>
          <div class="ingredient-list" id="ingredientList"></div>
        </section>
        <label>
          Instructions
          <textarea id="recipeSteps" placeholder="Cook rice. Sear chicken. Toss with lemon dressing."></textarea>
        </label>
        <div class="dialog-actions">
          <button class="danger-btn" type="button" id="deleteRecipeBtn">Delete</button>
          <div>
            <button class="secondary-btn" type="button" id="cancelRecipeBtn">Cancel</button>
            <button class="primary-btn" id="saveRecipeBtn" value="default">Save recipe</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog class="recipe-dialog" id="recipeViewDialog">
      <div class="recipe-form recipe-view">
        <div class="dialog-head">
          <div>
            <p class="muted-label">Recipe</p>
            <h2 id="recipeViewTitle">Recipe</h2>
          </div>
          <button class="icon-btn" type="button" id="closeRecipeViewBtn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <div id="recipeViewContent"></div>
      </div>
    </dialog>

    <dialog class="recipe-dialog" id="importDialog">
      <div class="recipe-form">
        <div class="dialog-head">
          <div>
            <p class="muted-label">Import</p>
            <h2>Recipe from URL</h2>
          </div>
          <button class="icon-btn" id="closeImportBtn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <label>
          Recipe URL
          <input id="importUrl" placeholder="Paste a NYT, Bon Appetit, or Google Drive URL" />
        </label>
        <div class="import-actions">
          <button class="primary-btn" type="button" id="fetchRecipeBtn">Fetch from URL</button>
        </div>
        <label>
          Paste recipe text
          <textarea id="importText" placeholder="If the site blocks import, paste the recipe title, ingredients, and instructions here."></textarea>
        </label>
        <p class="import-status" id="importStatus"></p>
        <div class="dialog-actions">
          <span></span>
          <div>
            <button class="secondary-btn" type="button" id="cancelImportBtn">Cancel</button>
            <button class="primary-btn" type="button" id="usePastedRecipeBtn">Use pasted recipe</button>
          </div>
        </div>
      </div>
    </dialog>

    <dialog class="recipe-dialog auth-dialog" id="authDialog">
      <form method="dialog" class="recipe-form" id="authForm">
        <div class="dialog-head">
          <div>
            <p class="muted-label">Cloud sync</p>
            <h2>Sign in to Eat</h2>
          </div>
          <button class="icon-btn" type="button" id="closeAuthBtn" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <button class="oauth-btn" type="button" id="googleSignInBtn">
          <span class="google-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path fill="#4285f4" d="M23.5 12.3c0-.8-.1-1.6-.2-2.3H12v4.4h6.5c-.3 1.4-1.1 2.6-2.3 3.4v2.8h3.7c2.2-2 3.6-5 3.6-8.3Z" />
              <path fill="#34a853" d="M12 24c3.1 0 5.8-1 7.7-2.8L16 18.4c-1 .7-2.3 1.1-4 1.1-3 0-5.5-2-6.4-4.7H1.8v2.9C3.7 21.4 7.5 24 12 24Z" />
              <path fill="#fbbc05" d="M5.6 14.8c-.2-.7-.4-1.5-.4-2.3s.1-1.6.4-2.3V7.3H1.8C1 8.9.5 10.7.5 12.5s.5 3.6 1.3 5.2l3.8-2.9Z" />
              <path fill="#ea4335" d="M12 5.5c1.7 0 3.2.6 4.4 1.7l3.3-3.3C17.8 2.1 15.1 1 12 1 7.5 1 3.7 3.6 1.8 7.3l3.8 2.9C6.5 7.5 9 5.5 12 5.5Z" />
            </svg>
          </span>
          Continue with Google
        </button>
        <button class="oauth-btn" type="button" id="appleSignInBtn">
          <span class="apple-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M16.4 1.8c.1 1.1-.4 2.1-1 2.9-.7.9-1.8 1.5-2.8 1.4-.1-1.1.4-2.1 1-2.8.7-.8 1.9-1.4 2.8-1.5ZM20 17.4c-.5 1.2-.8 1.7-1.5 2.8-1 1.5-2.4 3.4-4.1 3.4-1.5 0-1.9-1-4-1s-2.5 1-4 1c-1.8 0-3.1-1.8-4.1-3.3C-.5 16 .1 10 4.4 9.8c1.7 0 2.9 1.1 4 1.1s2.2-1.3 4.2-1.1c.8 0 3 .3 4.4 2.4-3.9 2.2-3.3 7.4 3 5.2Z" />
            </svg>
          </span>
          Continue with Apple
        </button>
        <div class="auth-divider"><span>Email sign-in</span></div>
        <label>
          Email
          <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
        </label>
        <p class="import-status" id="authMessage"></p>
        <div class="dialog-actions">
          <span></span>
          <div>
            <button class="secondary-btn" type="button" id="cancelAuthBtn">Cancel</button>
            <button class="primary-btn" id="sendLoginBtn" value="default">Send sign-in link</button>
          </div>
        </div>
      </form>
    </dialog>

    <script>
      (() => {
        const isLocalPreview = ["localhost", "127.0.0.1"].includes(window.location.hostname);
        if (!isLocalPreview) return;

        const watchedFiles = ["./index.html", "./styles.css", "./app.js", "./supabase-config.js"];
        const signatures = new Map();

        async function fileSignature(path) {
          const response = await fetch(`${path}?watch=${Date.now()}`, { method: "HEAD", cache: "no-store" });
          return [
            response.headers.get("last-modified") || "",
            response.headers.get("content-length") || ""
          ].join(":");
        }

        async function checkForUpdates() {
          for (const file of watchedFiles) {
            const nextSignature = await fileSignature(file);
            const previousSignature = signatures.get(file);
            if (previousSignature && previousSignature !== nextSignature) {
              window.location.reload();
              return;
            }
            signatures.set(file, nextSignature);
          }
        }

        window.addEventListener("load", async () => {
          await checkForUpdates();
          window.setInterval(checkForUpdates, 1500);
        });
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js?v=auth-deploy-1"></script>
    <script src="./app.js?v=auth-deploy-1"></script>
  </body>
</html>
